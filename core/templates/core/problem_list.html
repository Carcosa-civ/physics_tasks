{% extends 'core/base.html' %}
{% block content %}
<h1>Задачи</h1>
<form method="get" style="margin-bottom:1rem;">
    <label>Фильтр по теме:</label>
    <select name="topic" onchange="this.form.submit()" style="width:auto; display:inline-block;">
        <option value="">Все темы</option>
        {% for topic in topics %}
            <option value="{{ topic.slug }}" {% if selected_topic == topic.slug %}selected{% endif %}>{{ topic.name }}</option>
        {% endfor %}
    </select>
</form>

<div class="grid">
    {% for problem in problems %}
        <div class="card">
            <h3>{{ problem.title }}</h3>
            <p>Тема: <a href="{{ problem.topic.get_absolute_url }}">{{ problem.topic.name }}</a></p>
            <a href="{% url 'core:problem_detail' problem.id %}" class="btn">Решать</a>
        </div>
    {% empty %}
        <p>Нет задач.</p>
    {% endfor %}
</div>

{% if user.is_authenticated %}
    <a href="{% url 'core:problem_create' %}" class="btn btn-success">Создать задачу</a>
{% endif %}
{% endblock %}
