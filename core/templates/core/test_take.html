{% extends 'core/base.html' %}
{% block content %}
<h1>Контрольная работа: {{ test.title }}</h1>
<p>Вопрос {{ current_index|add:1 }} из {{ total }}</p>
<div class="card">
    <h3>{{ problem.title }}</h3>
    <p>{{ problem.condition|linebreaks }}</p>
    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="current_index" value="{{ current_index }}">
        {{ form.as_p }}
        <button type="submit" class="btn">Ответить</button>
    </form>
</div>
{% endblock %}
