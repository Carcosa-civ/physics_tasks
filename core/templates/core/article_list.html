{% extends 'core/base.html' %}
{% block content %}
<h1>Учебник</h1>
<div class="grid">
    {% for article in articles %}
        <div class="card">
            <h3>{{ article.title }}</h3>
            <p>Тема: {{ article.topic.name }}</p>
            <a href="{{ article.get_absolute_url }}" class="btn">Читать</a>
        </div>
    {% empty %}
        <p>Статьи пока не добавлены.</p>
    {% endfor %}
</div>
{% endblock %}
